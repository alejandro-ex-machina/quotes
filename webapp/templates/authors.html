{% extends "base.html" %}

{% block title %}🦞 Merriam Lobster{% endblock %}

{% block content %}
<div class="container py-4">
  <h1 class="h3 mb-4 title-wh">Autores</h1>

  <div class="list-group">
    {% for author, count in authors %}
      <a href="/authors/{{ author }}" class="list-group-item list-group-item-action d-flex justify-content-between">
        <span>{{ author }}</span>
        <span class="badge text-bg-danger rounded-pill">{{ count }}</span>
      </a>
    {% endfor %}
  </div>


</div>
{% endblock %}
