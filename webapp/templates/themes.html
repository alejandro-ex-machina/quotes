{% extends "base.html" %}

{% block title %}🦞 Merriam Lobster{% endblock %}

{% block content %}

<div class="container py-4">

  <h1 class="h3 title-wh mb-4">Temas</h1>

  <div class="list-group shadow-sm">
    {% for theme, count in themes %}

      <div class="list-item">

      <a href="/themes/{{ theme }}" class="list-group-item list-group-item-action d-flex justify-content-between">
        <span class="grande">{{ theme }}</span>
        <span class="badge text-bg-secondary rounded-pill">{{ count }}</span>
      </a>

      </div>

    {% endfor %}
  </div>

</div>
{% endblock %}
