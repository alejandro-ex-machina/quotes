{% extends "base.html" %}

{% block title %}🦞 Merriam Lobster{% endblock %}

{% block content %}

<div class="container py-4">

  <h1 class="h3 mb-4">Temas</h1>

  <div class="list-group">
    {% for theme, count in themes %}
      <a href="/themes/{{ theme }}" class="list-group-item list-group-item-action d-flex justify-content-between">
        <span>{{ theme }}</span>
        <span class="badge bg-secondary">{{ count }}</span>
      </a>
    {% endfor %}
  </div>

</div>
{% endblock %}
