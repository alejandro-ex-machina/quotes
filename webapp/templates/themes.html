{% extends "base.html" %}

{% block title %}Temas · Merriam Lobster{% endblock %}

{% block extra_css %}
<link href="{{ url_for('static', path='css/listings.css') }}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="container">
  <div class="ml-listing-wrap">
    <header class="mb-4">
      <h1 class="ml-page-title">Temas</h1>
      <div class="ml-page-subtitle">
        {{ results_total }} temas disponibles
      </div>
    </header>

    <form method="get" class="ml-list-search">
      <div class="input-group">
<span class="input-group-text">
  <i class="bi bi-search"></i>
</span>
        <input
          type="search"
          name="q"
          class="form-control"
          placeholder="Buscar tema..."
          value="{{ q or '' }}"
          aria-label="Buscar tema">
<button class="btn" type="submit">
  <i class="bi bi-chevron-right"></i>
</button>

    </div>
    </form>

    <div class="ml-list">
      {% for theme, count in themes %}
        <a href="{{ url_for('theme_detail', theme=theme) }}" class="ml-list-item">
          <span class="ml-list-label">{{ theme }}</span>
          <span class="ml-list-meta">
            <span class="ml-count-badge">{{ count }}</span>
          </span>
        </a>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
