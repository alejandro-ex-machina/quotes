<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Categorías · Quotes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', path='/custom.css') }}" rel="stylesheet">
  <script src="{{ url_for('static', path='/copy.js') }}"></script>
</head>
<body data-bs-theme="dark" class="bg-body-tertiary">
  <div class="container py-3 py-md-4">
    <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-4">
      <div>
        <h1 class="h3 mb-1">Categorías</h1>
        <p class="text-secondary mb-0">Explora ideas por procedencia o ámbito</p>
      </div>
      <a href="/" class="btn btn-outline-secondary">Inicio</a>
    </div>

    {% if categories %}
      <div class="list-group shadow-sm">
        {% for category, count in categories %}
          <a href="/categories/{{ category | urlencode }}"
             class="list-group-item list-group-item-action d-flex align-items-center justify-content-between gap-3 py-3 px-3">
            <span class="fw-medium">{{ category }}</span>
            <span class="badge text-bg-secondary rounded-pill">{{ count }}</span>
          </a>
        {% endfor %}
      </div>
    {% else %}
      <div class="alert alert-warning mb-0">
        No hay categorías disponibles.
      </div>
    {% endif %}
  </div>
</body>
</html>
