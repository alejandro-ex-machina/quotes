{% extends "base.html" %}

{% block title %}🦞 Merriam Lobster{% endblock %}

{% block content %}

  <div class="container py-3 py-md-4">
    <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-4">
      <div>
        <h1 class="h3 title-wh mb-1">Categorías</h1>
      </div>
    </div>

    {% if categories %}
      <div class="list-group shadow-sm">
        {% for category, count in categories %}
          <a href="/categories/{{ category | urlencode }}"
             class="list-group-item list-group-item-action d-flex align-items-center justify-content-between gap-3 py-3 px-3">
            <span class="fw-medium">{{ category }}</span>
            <span class="badge text-bg-danger rounded-pill">{{ count }}</span>
          </a>
        {% endfor %}
      </div>
    {% else %}
      <div class="alert alert-warning mb-0">
        No hay categorías disponibles.
      </div>
    {% endif %}
  </div>

  {% endblock %}
